<!DOCTYPE html>
<html>
<head>
  <title>Play vs Model</title>
  <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
  <style>
    body { font-family: sans-serif; max-width: 1200px; margin: 2em auto; padding: 0 1em; }
    #layout { display: flex; align-items: flex-start; justify-content: center; gap: 24px; }
    #center { flex: 0 0 480px; }
    #side-left, #side-right { flex: 1; min-width: 220px; max-width: 320px; }
    #board { width: 480px; }
    #status { margin: 1em 0; }
    #metadata { font-size: 0.9em; color: #444; }
    #metadata table { border-collapse: collapse; }
    #metadata td { padding: 2px 12px 2px 0; }
    #metadata td:first-child { color: #888; }
    #dist { font-size: 0.9em; }
    #dist table { border-collapse: collapse; width: 100%; }
    #dist td { padding: 2px 6px; vertical-align: middle; font-family: monospace; }
    #dist td.mv { width: 60px; }
    #dist td.pct { width: 56px; text-align: right; color: #444; }
    #dist td.lg { width: 64px; text-align: right; color: #888; }
    #dist td.bar { padding: 0 6px; }
    #dist .barwrap { background: #eee; height: 10px; width: 100%; }
    #dist .barfill { background: #4a7; height: 100%; }
    #dist tr.top td.mv { font-weight: bold; }
  </style>
</head>
<body>
  <h2>Play vs Model</h2>
  <div id="layout">
    <div id="side-left"><div id="metadata"></div></div>
    <div id="center">
      <div id="board"></div>
      <div id="status">Your move (white).</div>
      <button id="reset">Reset</button>
    </div>
    <div id="side-right"><div id="dist"></div></div>
  </div>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
  <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
  <script>
    var game = new Chess();
    var board;
    function setStatus(m) { $("#status").text(m); }

    function checkOver() {
      if (!game.game_over()) return false;
      setStatus(game.in_checkmate() ? "Checkmate." :
                game.in_draw() ? "Draw." : "Game over.");
      return true;
    }

    async function modelMove() {
      setStatus("Model thinking...");
      var res = await fetch("/move", {
        method: "POST", headers: {"Content-Type": "application/json"},
        body: JSON.stringify({fen: game.fen()})
      });
      var reader = res.body.getReader();
      var decoder = new TextDecoder();
      var buf = "", finalMove = null;
      while (true) {
        var chunk = await reader.read();
        if (chunk.done) break;
        buf += decoder.decode(chunk.value, {stream: true});
        var idx;
        while ((idx = buf.indexOf("\n")) >= 0) {
          var line = buf.slice(0, idx).trim();
          buf = buf.slice(idx + 1);
          if (!line) continue;
          var msg = JSON.parse(line);
          renderDist(msg.dist || [], msg.batch, msg.num_batches);
          if (msg.done) finalMove = msg.move;
          else setStatus("Model thinking... batch " + (msg.batch + 1) + "/" + msg.num_batches);
        }
      }
      if (finalMove) {
        game.move({from: finalMove.slice(0,2), to: finalMove.slice(2,4),
                   promotion: finalMove.slice(4) || undefined});
        board.position(game.fen());
      }
      if (!checkOver()) setStatus("Your move.");
    }

    function onDrop(source, target) {
      var mv = game.move({from: source, to: target, promotion: 'q'});
      if (mv === null) return 'snapback';
      if (checkOver()) return;
      window.setTimeout(modelMove, 150);
    }

    board = Chessboard("board", {
      draggable: true, position: "start", onDrop: onDrop,
      pieceTheme: "https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png"
    });

    function renderDist(dist, batch, numBatches) {
      if (!dist.length) { $("#dist").empty(); return; }
      var max = dist[0].prob;
      var total = dist.reduce(function(s, d) { return s + d.visits; }, 0);
      var rows = dist.map(function(d, i) {
        var pct = (d.prob * 100).toFixed(1) + "%";
        var w = (max > 0 ? d.prob / max * 100 : 0).toFixed(1) + "%";
        return "<tr class='" + (i === 0 ? "top" : "") + "'>" +
               "<td class='mv'>" + d.move + "</td>" +
               "<td class='pct'>" + pct + "</td>" +
               "<td class='bar'><div class='barwrap'><div class='barfill' style='width:" + w + "'></div></div></td>" +
               "<td class='lg'>" + d.visits + "</td></tr>";
      }).join("");
      var head = "<b>Search visits (" + total + ")</b>";
      if (batch != null && numBatches != null)
        head += " <span style='color:#888'>batch " + (batch + 1) + "/" + numBatches + "</span>";
      $("#dist").html(head + "<table>" + rows + "</table>");
    }

    $("#reset").click(function() {
      game = new Chess(); board.start(); setStatus("Your move (white).");
      $("#dist").empty();
    });

    $.getJSON("/metadata", function(meta) {
      var keys = Object.keys(meta);
      if (!keys.length) { $("#metadata").text("No model metadata."); return; }
      var rows = keys.map(function(k) {
        var v = meta[k];
        if (typeof v === "number") v = v.toLocaleString();
        return "<tr><td>" + k + "</td><td>" + v + "</td></tr>";
      }).join("");
      $("#metadata").html("<b>Model</b><table>" + rows + "</table>");
    });
  </script>
</body>
</html>
